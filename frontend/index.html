<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Self-Evolving MCP Brain</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #161a22;
      --panel-2: #1c2230;
      --border: #2a3142;
      --text: #e6e8ee;
      --muted: #8b93a7;
      --accent: #6ea8fe;
      --accent-2: #7cf0bd;
      --danger: #ff6b6b;
      --code-bg: #0b0e14;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
    #app { display: flex; flex-direction: column; height: 100vh; position: relative; }

    .sidebar-backdrop { position: fixed; inset: 0; z-index: 99; background: rgba(0,0,0,0.45);
      animation: fade-in .2s ease; }
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }

    .sidebar {
      position: fixed; top: 0; left: 0; width: 280px; height: 100vh; z-index: 100;
      background: rgba(17, 19, 24, 0.94); backdrop-filter: blur(18px);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      transform: translateX(-100%); transition: transform .25s cubic-bezier(.4,0,.2,1);
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 16px; border-bottom: 1px solid var(--border);
    }
    .sidebar-header h2 { margin: 0; font-size: 14px; font-weight: 600; letter-spacing: .3px; }
    .sidebar-header button {
      background: transparent; border: 1px solid var(--border); color: var(--muted);
      width: 28px; height: 28px; border-radius: 6px; font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; line-height: 1;
    }
    .sidebar-header button:hover { color: var(--text); border-color: var(--muted); }
    .sidebar-new-btn {
      display: block; width: calc(100% - 16px); margin: 8px 8px 0;
      background: transparent; border: 1px dashed var(--border); color: var(--accent);
      border-radius: 8px; padding: 8px 12px; font-size: 12px; font-weight: 600;
      cursor: pointer; text-align: center; transition: all .15s;
    }
    .sidebar-new-btn:hover { border-color: var(--accent); background: rgba(110,168,254,0.06); }
    .sidebar-list { flex: 1; overflow-y: auto; padding: 4px 0 8px; }
    .sidebar-empty { padding: 24px 16px; color: var(--muted); font-size: 13px; text-align: center; }
    .sidebar-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; cursor: pointer; transition: background .12s;
      border-left: 2px solid transparent;
    }
    .sidebar-item:hover { background: rgba(255,255,255,0.03); }
    .sidebar-item.active {
      background: rgba(110,168,254,0.08);
      border-left-color: var(--accent);
    }
    .history-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    }
    .history-dot.crystallized { background: var(--accent-2); }
    .history-dot.pending {
      background: transparent; border: 2px solid var(--muted);
    }
    .history-meta { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
    .history-snippet { font-size: 13px; color: var(--text); white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; }
    .history-time { font-size: 10px; color: var(--muted); }
    .history-tag {
      font-size: 10px; padding: 2px 6px; border-radius: 4px;
      font-weight: 600; letter-spacing: .3px; flex-shrink: 0;
    }
    .history-tag.crystallized { background: rgba(124,240,189,0.13); color: var(--accent-2); }
    .history-tag.pending { background: rgba(139,147,167,0.12); color: var(--muted); }

    header { padding: 12px 18px; border-bottom: 1px solid var(--border);
      background: var(--panel); display: flex; align-items: center; gap: 14px; }
    header h1 { font-size: 15px; margin: 0; font-weight: 600; letter-spacing: .3px; }
    header .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
    header .dot.ok { background: var(--accent-2); }
    header .dot.bad { background: var(--danger); }
    header .status { font-size: 12px; color: var(--muted); }
    header .spacer { flex: 1; }
    header select { background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
      border-radius: 6px; padding: 4px 8px; font-size: 12px; }
    .sidebar-toggle {
      background: transparent; border: 1px solid var(--border); color: var(--muted);
      border-radius: 6px; padding: 4px 8px; font-size: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; line-height: 1;
    }
    .sidebar-toggle:hover { color: var(--text); border-color: var(--muted); }

    main { flex: 1; display: grid; grid-template-columns: 1fr 1fr; min-height: 0; }
    .col { display: flex; flex-direction: column; min-height: 0; }
    .col + .col { border-left: 1px solid var(--border); }
    .col-head { padding: 10px 14px; border-bottom: 1px solid var(--border); font-size: 12px;
      text-transform: uppercase; letter-spacing: .8px; color: var(--muted); background: var(--panel); }

    .chat-area { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 12px; }
    .msg { max-width: 92%; padding: 10px 12px; border-radius: 10px; font-size: 14px; line-height: 1.5;
      white-space: pre-wrap; word-break: break-word; }
    .msg.user { align-self: flex-end; background: var(--accent); color: #0b0e14; }
    .msg.assistant { align-self: flex-start; background: var(--panel-2); border: 1px solid var(--border); }
    .msg .role { font-size: 11px; opacity: .65; margin-bottom: 4px; }
    .msg pre { background: var(--code-bg); padding: 8px; border-radius: 6px; overflow-x: auto;
      font-size: 12.5px; margin: 6px 0; }
    .msg code { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }

    .composer { border-top: 1px solid var(--border); padding: 10px; display: flex; gap: 8px; background: var(--panel); }
    .composer textarea { flex: 1; resize: none; height: 60px; max-height: 140px; background: var(--bg);
      color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px;
      font: inherit; }
    .composer button { border: 0; border-radius: 8px; padding: 0 18px; font-weight: 600; cursor: pointer;
      background: var(--accent); color: #0b0e14; }
    .composer button:disabled { opacity: .5; cursor: not-allowed; }
    .composer .upload-btn { background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
      padding: 0 12px; font-size: 18px; line-height: 1; }
    .composer .upload-btn input { display: none; }
    .meta-line { font-size: 11px; color: var(--muted); padding: 0 14px 8px; }
    .err { color: var(--danger); }
    .dropzone { border: 2px dashed var(--border); border-radius: 10px; padding: 18px; margin: 10px 14px;
      text-align: center; color: var(--muted); font-size: 13px; transition: all .15s; }
    .dropzone.active { border-color: var(--accent-2); background: rgba(124,240,189,0.06); color: var(--accent-2); }
    .dropzone .hint { font-size: 11px; margin-top: 4px; }

    .preview-head { display: flex; justify-content: space-between; align-items: center; }
    .preview-tabs { display: flex; gap: 4px; }
    .preview-tab { background: transparent; border: 1px solid var(--border); color: var(--muted);
      border-radius: 5px; padding: 3px 10px; font-size: 11px; cursor: pointer;
      text-transform: none; letter-spacing: 0; transition: all .15s; }
    .preview-tab:hover { border-color: var(--muted); color: var(--text); }
    .preview-tab.active { background: var(--accent); color: #0b0e14; border-color: var(--accent); }
    .preview-area { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
    .preview-scroll { flex: 1; overflow-y: auto; padding: 10px; }
    .empty { color: var(--muted); font-size: 13px; padding: 20px; text-align: center; }
    .code-card { background: var(--code-bg); border: 1px solid var(--border); border-radius: 8px;
      margin-bottom: 10px; overflow: hidden; }
    .code-card .bar { display: flex; justify-content: space-between; align-items: center;
      background: var(--panel-2); padding: 6px 10px; font-size: 12px; color: var(--muted);
      border-bottom: 1px solid var(--border); }
    .code-card .bar .lang { font-weight: 600; color: var(--accent-2); }
    .code-card .bar button { background: transparent; border: 1px solid var(--border); color: var(--muted);
      border-radius: 5px; padding: 2px 8px; font-size: 11px; cursor: pointer; }
    .code-card pre { margin: 0; padding: 10px 12px; overflow-x: auto; font-size: 12.5px;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }

    .live-preview-container { flex: 1; overflow: hidden; position: relative; }
    .live-frame { width: 100%; height: 100%; border: 0; display: block; }
    .live-unsupported { padding: 40px 20px; text-align: center; color: var(--muted); font-size: 13px; }
    .live-unsupported strong { display: block; margin-bottom: 8px; color: var(--danger); }

    .crystal-bar { border-top: 2px solid var(--accent-2); padding: 12px;
      background: linear-gradient(180deg, rgba(124,240,189,0.06), transparent);
      display: flex; flex-direction: column; gap: 8px; }
    .crystal-bar.disabled { opacity: .4; }
    .crystal-row { display: flex; gap: 8px; align-items: center; }
    .crystal-row input { flex: 1; background: var(--bg); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; font: inherit; }
    .btn-crystallize { border: 0; border-radius: 8px; padding: 10px 18px; font-weight: 700;
      cursor: pointer; background: var(--accent-2); color: #0b0e14; font-size: 14px;
      letter-spacing: .3px; white-space: nowrap; }
    .btn-crystallize:disabled { opacity: .4; cursor: not-allowed; }
    .crystal-hint { font-size: 11px; color: var(--muted); }
    .crystal-status { font-size: 12px; padding: 6px 10px; border-radius: 6px; }
    .crystal-status.ok { background: rgba(124,240,189,0.12); color: var(--accent-2); }
    .crystal-status.err { background: rgba(255,107,107,0.12); color: var(--danger); }

    .steps-msg { align-self: flex-start; max-width: 92%; }
    .steps-track { display: flex; align-items: center; gap: 6px; padding: 10px 14px;
      background: var(--panel-2); border: 1px solid var(--border); border-radius: 10px;
      font-size: 12px; }
    .step-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
      background: var(--border); transition: all .3s; }
    .step-dot.done { background: var(--accent-2); box-shadow: 0 0 6px rgba(124,240,189,0.5); }
    .step-dot.active { background: var(--accent); box-shadow: 0 0 8px rgba(110,168,254,0.6);
      animation: step-pulse 1.2s ease-in-out infinite; }
    .step-dot.error { background: var(--danger); box-shadow: 0 0 6px rgba(255,107,107,0.5); }
    .step-line { flex: 1; height: 1px; background: var(--border); min-width: 12px;
      transition: background .3s; }
    .step-line.done { background: var(--accent-2); }
    .step-label { color: var(--muted); white-space: nowrap; font-size: 11px; transition: color .3s; }
    .step-label.active { color: var(--accent); }
    .step-label.done { color: var(--accent-2); }
    .step-label.error { color: var(--danger); }
    @keyframes step-pulse {
       0%, 100% { box-shadow: 0 0 4px rgba(110,168,254,0.4); }
       50% { box-shadow: 0 0 12px rgba(110,168,254,0.8); }
     }

    .library-page { display: flex; flex: 1; min-height: 0; }
    .library-sidebar {
      width: 210px; flex-shrink: 0; border-right: 1px solid var(--border);
      background: var(--panel); display: flex; flex-direction: column; overflow-y: auto;
    }
    .library-sidebar h3 {
      margin: 0; padding: 12px 14px 8px; font-size: 11px; text-transform: uppercase;
      letter-spacing: .8px; color: var(--muted); border-bottom: 1px solid var(--border);
    }
    .lib-cat-item {
      padding: 8px 14px; font-size: 13px; cursor: pointer; color: var(--muted);
      display: flex; justify-content: space-between; align-items: center;
      border-left: 2px solid transparent; transition: all .12s;
    }
    .lib-cat-item:hover { color: var(--text); background: rgba(255,255,255,0.03); }
    .lib-cat-item.active {
      color: var(--accent); background: rgba(110,168,254,0.08);
      border-left-color: var(--accent);
    }
    .lib-cat-count {
      font-size: 10px; background: var(--panel-2); padding: 1px 6px; border-radius: 8px;
      color: var(--muted);
    }
    .library-main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; min-height: 0; }
    .library-header-bar {
      padding: 10px 16px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px; background: var(--panel);
      position: sticky; top: 0; z-index: 5;
    }
    .library-search-bar {
      flex: 1; display: flex; align-items: center; gap: 10px;
    }
    .library-search-bar input {
      flex: 1; background: var(--bg); color: var(--text); border: 1px solid var(--border);
      border-radius: 8px; padding: 7px 10px; font: inherit; font-size: 13px;
    }
    .lib-item-count { font-size: 12px; color: var(--muted); white-space: nowrap; }
    .btn-back-chat {
      background: transparent; border: 1px solid var(--border); color: var(--muted);
      border-radius: 6px; padding: 5px 10px; font-size: 12px; cursor: pointer;
      white-space: nowrap; transition: all .12s;
    }
    .btn-back-chat:hover { color: var(--text); border-color: var(--muted); }
    .library-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px; padding: 14px;
    }
    .lib-card {
      background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
      display: flex; flex-direction: column; overflow: hidden;
      transition: border-color .15s;
    }
    .lib-card:hover { border-color: var(--muted); }
    .lib-card-category {
      font-size: 10px; font-weight: 600; letter-spacing: .5px;
      padding: 2px 7px; border-radius: 4px; background: rgba(110,168,254,0.12); color: var(--accent);
      display: inline;
    }
    .lib-card-name {
      font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.3;
    }
    .lib-card-tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .lib-tag {
      font-size: 10px; padding: 2px 7px; border-radius: 10px;
      background: rgba(124,240,189,0.1); color: var(--accent-2);
    }
    .lib-card-meta { font-size: 11px; color: var(--muted); }
    .lib-card-actions { display: flex; gap: 6px; margin-top: 4px; }
    .lib-card-actions button {
      background: transparent; border: 1px solid var(--border); color: var(--muted);
      border-radius: 5px; padding: 4px 10px; font-size: 11px; cursor: pointer;
      transition: all .12s;
    }
    .lib-card-actions button:hover:not(:disabled) { color: var(--text); border-color: var(--muted); }
    .lib-card-actions button:disabled { opacity: .4; cursor: not-allowed; }
    .lib-card-actions button.danger:hover:not(:disabled) { color: var(--danger); border-color: var(--danger); }
    .library-empty {
      padding: 48px 20px; text-align: center; color: var(--muted); font-size: 14px;
    }
    .library-empty strong { display: block; margin-bottom: 8px; color: var(--text); font-size: 16px; }
    .sidebar-library-btn {
      display: block; width: calc(100% - 16px); margin: 4px 8px 8px;
      background: transparent; border: 1px dashed var(--border); color: var(--accent-2);
      border-radius: 8px; padding: 8px 12px; font-size: 12px; font-weight: 600;
      cursor: pointer; text-align: center; transition: all .15s;
    }
    .sidebar-library-btn:hover { border-color: var(--accent-2); background: rgba(124,240,189,0.06); }
    .library-toast {
      position: fixed; bottom: 20px; right: 20px; z-index: 200; max-width: 380px;
      padding: 12px 18px; border-radius: 10px; font-size: 13px;
      display: flex; align-items: center; gap: 8px;
      animation: toast-in .25s ease;
    }
    .library-toast.ok { background: rgba(124,240,189,0.15); border: 1px solid var(--accent-2); color: var(--accent-2); }
    .library-toast.err { background: rgba(255,107,107,0.15); border: 1px solid var(--danger); color: var(--danger); }
    @keyframes toast-in { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    .lib-card-preview {
      position: relative; width: 100%; height: 180px; overflow: hidden;
      border-radius: 8px 8px 0 0; background: var(--code-bg);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .lib-card-frame {
      width: 300%; height: 300%; border: 0; display: block;
      transform: scale(0.3333); transform-origin: 0 0;
      pointer-events: none;
    }
    .lib-card-preview-empty {
      display: flex; align-items: center; justify-content: center;
      height: 100%; color: var(--muted); font-size: 12px;
    }
    .lib-card-body { flex: 1; display: flex; flex-direction: column; gap: 6px; padding: 10px 14px 12px; }
   </style>
</head>
<body>
  <div id="app">
    <div v-if="sidebarOpen" class="sidebar-backdrop" @click="sidebarOpen = false"></div>
    <aside class="sidebar" :class="{ open: sidebarOpen }">
      <div class="sidebar-header">
        <h2>History</h2>
        <button @click="sidebarOpen = false">&times;</button>
      </div>
      <button class="sidebar-new-btn" @click="newSession">+ New Session</button>
      <div class="sidebar-list">
        <div v-if="!historySessions.length" class="sidebar-empty">No history yet</div>
        <div v-for="s in historySessions" :key="s.id" class="sidebar-item"
             :class="{ active: s.id === activeSessionId }"
             @click="selectSession(s)">
          <span class="history-dot" :class="s.crystallized ? 'crystallized' : 'pending'"></span>
          <div class="history-meta">
            <span class="history-snippet">{{ s.snippet }}</span>
            <span class="history-time">{{ s.timestamp }}</span>
          </div>
          <span class="history-tag" :class="s.crystallized ? 'crystallized' : 'pending'">
            {{ s.crystallized ? 'Crystallized' : 'Pending' }}
          </span>
        </div>
      </div>
      <div class="sidebar-library-btn" @click="openLibrary">{{ view === 'library' ? 'Back to Chat' : 'Library' }}</div>
    </aside>

    <header>
      <button class="sidebar-toggle" @click="sidebarOpen = !sidebarOpen" title="History">&#9776;</button>
      <span class="dot" :class="healthClass"></span>
      <h1>Self-Evolving MCP Brain</h1>
      <span class="status">{{ healthText }}</span>
      <span class="spacer"></span>
      <select v-model="model" :disabled="!models.length">
        <option value="">auto (proxy default)</option>
        <option v-for="m in models" :key="m" :value="m">{{ m }}</option>
      </select>
    </header>

    <main>
      <template v-if="view === 'chat'">
      <section class="col">
        <div class="col-head">Conversation</div>
        <div class="chat-area" ref="chatArea">
          <div v-if="!messages.length && !steps.length" class="empty">
            Paste a URL, GitHub/CodePen link, raw code, or an image URL below to begin.
            The model may ask clarifying questions — just reply to iterate.
          </div>
          <div v-for="(m, i) in messages" :key="i" class="msg" :class="m.role">
            <div class="role">{{ m.role }}</div>
            <div v-html="renderInline(m.content)"></div>
          </div>
          <div v-if="steps.length" class="msg steps-msg">
            <div class="steps-track">
              <template v-for="(s, i) in steps" :key="s.step">
                <span class="step-dot" :class="s.status"></span>
                <span class="step-label" :class="s.status">{{ s.label }}</span>
                <span v-if="i < steps.length - 1" class="step-line"
                      :class="{ done: steps[i+1].status === 'active' || steps[i+1].status === 'done' }"></span>
              </template>
            </div>
            <div v-if="stepMsg" style="margin-top:6px;font-size:11px;color:var(--muted);padding:0 2px;">
              {{ stepMsg }}
            </div>
          </div>
        </div>
        <div class="meta-line">
          <span v-if="lastMeta">model: {{ lastMeta.model }}
            <span v-if="lastMeta.routed_via"> · via {{ lastMeta.routed_via }}</span>
            <span v-if="lastMeta.input_type"> · input: {{ lastMeta.input_type }}</span>
          </span>
          <span v-if="errorMsg" class="err"> · {{ errorMsg }}</span>
        </div>
        <div class="dropzone" :class="{ active: dragging }"
             @dragenter.prevent="dragging = true"
             @dragover.prevent="dragging = true"
             @dragleave.prevent="dragging = false"
             @drop.prevent="onDrop">
          <div v-if="!dragging">&#x1F4CE; Drop a <code>.zip</code> / image / code file here, or use the &#x1F4C2; button</div>
          <div v-else>Release to upload</div>
          <div class="hint">ZIPs: code files extracted (node_modules/.git skipped) · Images: analyzed via vision</div>
        </div>
        <div class="composer">
          <textarea v-model="draft" @keydown.enter.exact.prevent="send"
                    placeholder="Submit input (Enter to send, Shift+Enter for newline)…"></textarea>
          <label class="upload-btn" title="Upload file">
            &#x1F4C2;<input type="file" @change="onFilePick"
                       accept=".zip,.png,.jpg,.jpeg,.gif,.webp,.html,.css,.js,.ts,.vue,.json,.md,.txt" />
          </label>
          <button @click="send" :disabled="busy || !draft.trim()">
            {{ busy ? '…' : (messages.length ? 'Send' : 'Analyze') }}
          </button>
        </div>
      </section>

      <section class="col">
        <div class="col-head preview-head">
          <span>Code Preview</span>
          <div class="preview-tabs">
            <button class="preview-tab" :class="{ active: previewTab === 'code' }"
                    @click="setPreviewTab('code')">Code</button>
            <button class="preview-tab" :class="{ active: previewTab === 'live' }"
                    @click="setPreviewTab('live')">Live Preview</button>
          </div>
        </div>

        <div class="preview-area">
          <div v-if="previewTab === 'code'" class="preview-scroll">
            <div v-if="!codeBlocks.length" class="empty">
              Code blocks the model produces will appear here for review.
            </div>
            <div v-for="(b, i) in codeBlocks" :key="i" class="code-card">
              <div class="bar">
                <span class="lang">{{ b.lang || 'code' }}</span>
                <button @click="copy(b.code)">copy</button>
              </div>
              <pre><code>{{ b.code }}</code></pre>
            </div>
          </div>

          <div v-else class="live-preview-container">
            <div v-if="!liveComponentCode" class="empty">
              No Vue component detected in the latest reply.
            </div>
            <div v-else-if="liveError" class="live-unsupported">
              <strong>Live Render Error</strong>
              {{ liveError }}
            </div>
            <iframe v-else :key="liveFrameKey" :srcdoc="liveSrc" class="live-frame"
                    title="Live component preview"></iframe>
          </div>
        </div>

        <div class="crystal-bar" :class="{ disabled: !canCrystallize }">
          <div class="crystal-row">
            <input v-model="skillName" :disabled="!canCrystallize"
                   placeholder="Skill name (e.g. GSAP Nav Animations)" />
            <button class="btn-crystallize" :disabled="!canCrystallize || crystallizing"
                    @click="crystallize">
              {{ crystallizing ? 'CRYSTALLIZING…' : '✦ APPROVE & CRYSTALLIZE' }}
            </button>
          </div>
          <div class="crystal-hint">
            <span v-if="!canCrystallize">
              Appears once the model has produced both rules (prose) and a code snippet.
            </span>
            <span v-else>
              {{ codeBlocks.length }} code block(s) ready · rules detected ({{ rulesText.length }} chars).
              Saves to <code>.mcp_skills/</code> and is instantly available to the MCP server.
            </span>
          </div>
          <div v-if="crystalStatus" class="crystal-status" :class="crystalStatus.kind">
            {{ crystalStatus.text }}
          </div>
        </div>
      </section>
      </template>

      <template v-else>
        <div class="library-page">
          <aside class="library-sidebar">
            <h3>Categories</h3>
            <div v-for="cat in libraryCategories" :key="cat"
                 class="lib-cat-item"
                 :class="{ active: libraryCategory === cat }"
                 @click="libraryCategory = cat">
              {{ cat }}
              <span class="lib-cat-count">{{ cat === 'All' ? libraryItems.length : catCount(cat) }}</span>
            </div>
          </aside>
          <div class="library-main">
            <div class="library-header-bar">
              <button class="btn-back-chat" @click="view = 'chat'">Back to Chat</button>
              <div class="library-search-bar">
                <input v-model="librarySearch" placeholder="Search library..." />
                <span class="lib-item-count">{{ libraryFiltered.length }} items</span>
              </div>
            </div>
            <div class="library-grid" v-if="libraryFiltered.length">
              <div v-for="item in libraryFiltered" :key="item.filename" class="lib-card">
                <div class="lib-card-preview">
                  <iframe v-if="previewCache[item.filename]"
                          :srcdoc="previewCache[item.filename]"
                          class="lib-card-frame" title="Preview"
                          sandbox="allow-scripts allow-same-origin"></iframe>
                  <div v-else class="lib-card-preview-empty">
                    {{ previewLoading[item.filename] ? 'Loading preview...' : 'No preview' }}
                  </div>
                </div>
                <div class="lib-card-body">
                  <div class="lib-card-name">{{ item.name }}</div>
                  <div class="lib-card-tags">
                    <span v-for="tag in item.tags" :key="tag" class="lib-tag">{{ tag }}</span>
                  </div>
                  <div class="lib-card-meta">
                    <span class="lib-card-category">{{ item.category }}</span>
                    &middot; {{ item.rule_chars }} chars &middot; {{ item.code_block_count }} snippet(s)
                  </div>
                  <div class="lib-card-actions">
                    <button @click="regenerateItem(item.filename)"
                            :disabled="regeneratingFilename === item.filename">
                      {{ regeneratingFilename === item.filename ? '...' : 'Edit' }}
                    </button>
                    <button @click="forkItem(item.filename)"
                            :disabled="forkingFilename === item.filename">Fork</button>
                    <button @click="deleteItem(item.filename)" class="danger">Delete</button>
                  </div>
                </div>
              </div>
            </div>
            <div v-else class="library-empty">
              <template v-if="libraryItems.length">
                No items match your search.
              </template>
              <template v-else>
                <strong>No crystallized skills yet</strong>
                Approve &amp; crystallize a response to populate your library.
              </template>
            </div>
          </div>
        </div>
      </template>
    </main>
    <div v-if="libraryToast" class="library-toast" :class="libraryToast.kind">{{ libraryToast.text }}</div>
  </div>

  <script>
    const { createApp, ref, nextTick, computed, watch } = Vue;

    createApp({
      setup() {
        const API = 'http://localhost:8000';
        const messages = ref([]);
        const draft = ref('');
        const busy = ref(false);
        const errorMsg = ref('');
        const lastMeta = ref(null);
        const codeBlocks = ref([]);
        const models = ref([]);
        const model = ref('');
        const health = ref(null);
        const chatArea = ref(null);
        const dragging = ref(false);

        const steps = ref([]);
        const stepMsg = ref('');

        const skillName = ref('');
        const crystallizing = ref(false);
        const crystalStatus = ref(null);
        const lastReply = ref('');

        const previewTab = ref('code');
        const liveFrameKey = ref(0);
        const liveError = ref('');

        const sidebarOpen = ref(false);
        const historySessions = ref([]);
        const activeSessionId = ref(null);
        const API_HISTORY = API + '/history';

        const view = ref('chat');
        const libraryItems = ref([]);
        const librarySearch = ref('');
        const libraryCategory = ref('All');
        const regeneratingFilename = ref(null);
        const forkingFilename = ref(null);
        const libraryToast = ref(null);
        const API_LIB = API + '/library';
        const previewCache = ref({});
        const previewLoading = ref({});

        async function loadHistory() {
          try {
            var r = await fetch(API_HISTORY);
            if (r.ok) historySessions.value = await r.json();
          } catch (e) { historySessions.value = []; }
        }
        function saveSession(session) {
          fetch(API_HISTORY, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(session),
          }).catch(function(){});
        }

        function snapshotState() {
          return {
            messages: JSON.parse(JSON.stringify(messages.value)),
            codeBlocks: JSON.parse(JSON.stringify(codeBlocks.value)),
            lastReply: lastReply.value,
            lastMeta: lastMeta.value ? JSON.parse(JSON.stringify(lastMeta.value)) : null,
            skillName: skillName.value,
            crystalStatus: crystalStatus.value ? JSON.parse(JSON.stringify(crystalStatus.value)) : null,
          };
        }
        function restoreState(snapshot) {
          if (!snapshot) return;
          messages.value = snapshot.messages || [];
          codeBlocks.value = snapshot.codeBlocks || [];
          lastReply.value = snapshot.lastReply || '';
          lastMeta.value = snapshot.lastMeta || null;
          skillName.value = snapshot.skillName || '';
          crystalStatus.value = snapshot.crystalStatus || null;
        }

        function flushCurrentSession() {
          if (!activeSessionId.value) return;
          var cur = historySessions.value.find(function(s) { return s.id === activeSessionId.value; });
          if (cur) {
            cur.snapshot = snapshotState();
            saveSession(cur);
          }
        }

        function createSession(snippet) {
          flushCurrentSession();
          var session = {
            id: Date.now(),
            snippet: (snippet || '').slice(0, 40),
            crystallized: false,
            timestamp: new Date().toLocaleString(),
            snapshot: snapshotState(),
          };
          historySessions.value.unshift(session);
          activeSessionId.value = session.id;
          saveSession(session);
        }
        function updateActiveSessionSnapshot() {
          if (!activeSessionId.value) return;
          var s = historySessions.value.find(function(s) { return s.id === activeSessionId.value; });
          if (s) {
            s.snapshot = snapshotState();
            saveSession(s);
          }
        }

        function selectSession(session) {
          if (busy.value) return;
          if (!session.snapshot || !session.snapshot.messages || !session.snapshot.messages.length) {
            sidebarOpen.value = false;
            return;
          }
          flushCurrentSession();
          restoreState(session.snapshot);
          activeSessionId.value = session.id;
          sidebarOpen.value = false;
          view.value = 'chat';
          nextTick(function() { scrollBottom(); });
        }

        function newSession() {
          if (busy.value) return;
          flushCurrentSession();
          messages.value = [];
          codeBlocks.value = [];
          lastReply.value = '';
          lastMeta.value = null;
          skillName.value = '';
          crystalStatus.value = null;
          activeSessionId.value = null;
          errorMsg.value = '';
          steps.value = [];
          stepMsg.value = '';
          sidebarOpen.value = false;
          view.value = 'chat';
        }

        const FENCE_GLOBAL = /```(\w+)?\n([\s\S]*?)```/g;
        const rulesText = computed(() => {
          if (!lastReply.value) return '';
          return lastReply.value.replace(FENCE_GLOBAL, '').trim();
        });
        const canCrystallize = computed(
          () => rulesText.value.length > 0 && codeBlocks.value.length > 0
        );

        const FENCE = /```(\w+)?\n([\s\S]*?)```/g;
        function extractCode(text) {
          const out = [];
          let m;
          while ((m = FENCE.exec(text)) !== null) {
            out.push({ lang: (m[1] || '').toLowerCase(), code: m[2].replace(/\n$/, '') });
          }
          return out;
        }

        function escapeHtml(s) {
          return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        }
        function renderInline(content) {
          if (typeof content !== 'string') return escapeHtml(JSON.stringify(content));
          const esc = escapeHtml(content);
          return esc.replace(/```(\w+)?\n([\s\S]*?)```/g,
            (_, lang, code) => `<pre><code>${code.replace(/\n$/, '')}</code></pre>`);
        }

        const liveComponentCode = computed(() => {
          if (!codeBlocks.value.length) return '';
          for (const b of codeBlocks.value) {
            if (/<template[\s>]/.test(b.code)) return b.code;
          }
          return codeBlocks.value[0].code;
        });

        function parseVueSFC(src) {
          if (!src) return null;
          const t = src.match(/<template[^>]*>([\s\S]*?)<\/template>/i);
          const sSetup = src.match(/<script\s+setup[^>]*>([\s\S]*?)<\/script>/i);
          const sPlain = src.match(/<script[^>]*>([\s\S]*?)<\/script>/i);
          const isSetup = /<script\s+setup/i.test(src);
          const styles = [];
          const styleRe = /<style[^>]*>([\s\S]*?)<\/style>/gi;
          let sm;
          while ((sm = styleRe.exec(src)) !== null) styles.push(sm[1]);
          return {
            template: t ? t[1].trim() : '',
            script: (sSetup || sPlain) ? (sSetup || sPlain)[1].trim() : '',
            isSetup: isSetup,
            styles: styles,
          };
        }

        function buildLivePreview(parsed) {
          if (!parsed || !parsed.template) return '';

          var templateJson = JSON.stringify(parsed.template);

          var styleLines = parsed.styles.map(function(css) {
            return '(function(){var el=document.createElement("style");el.textContent='
              + JSON.stringify(css) + ';document.head.appendChild(el)})();';
          }).join('\n');

          var setupFn = 'function(){}';
          var topImports = '';
          if (parsed.script && parsed.isSetup) {
            var imports = [];
            var code = parsed.script.replace(/^import\s+(.+)$/gm, function(m) {
              imports.push(m); return '';
            });
            topImports = imports.filter(function(l) {
              return !/from\s+['"]vue['"]/.test(l);
            }).join('\n');

            function extractTopLevelVars(src) {
              var vars = [];
              var depth = 0;
              var lines = src.split('\n');
              var declRe = /^\s*(?:const|let|var|function)\s+([\w$]+)/;
              for (var i = 0; i < lines.length; i++) {
                var stripped = lines[i].replace(/\/\/.*$/, '').replace(/\/\*[\s\S]*?\*\//g, '');
                if (depth === 0) {
                  var m = stripped.match(declRe);
                  if (m) {
                    var kw = m[0].match(/(const|let|var|function)/)[0];
                    var name = m[1];
                    var reserved = {if:1,for:1,while:1,switch:1,return:1,else:1,do:1,try:1,catch:1,finally:1};
                    if (!reserved[name] && vars.indexOf(name) === -1) vars.push(name);
                  }
                }
                var open = (stripped.match(/\{/g) || []).length;
                var close = (stripped.match(/\}/g) || []).length;
                depth += open - close;
                if (depth < 0) depth = 0;
              }
              return vars;
            }

            var vars = extractTopLevelVars(code);
            var returnStmt = vars.length ? '\nreturn { ' + vars.join(', ') + ' };' : '';
            setupFn = 'function() {\n'
              + 'var ref=Vue.ref,reactive=Vue.reactive,computed=Vue.computed,'
              + 'watch=Vue.watch,watchEffect=Vue.watchEffect,'
              + 'onMounted=Vue.onMounted,onUnmounted=Vue.onUnmounted,'
              + 'onBeforeMount=Vue.onBeforeMount,onBeforeUnmount=Vue.onBeforeUnmount,'
              + 'nextTick=Vue.nextTick,toRefs=Vue.toRefs,toRef=Vue.toRef,'
              + 'isRef=Vue.isRef,unref=Vue.unref,provide=Vue.provide,inject=Vue.inject,h=Vue.h;\n'
              + code + returnStmt + '\n}';
          } else if (parsed.script && !parsed.isSetup) {
            setupFn = 'function() {\n'
              + 'var ref=Vue.ref,reactive=Vue.reactive,computed=Vue.computed,'
              + 'watch=Vue.watch,watchEffect=Vue.watchEffect,'
              + 'onMounted=Vue.onMounted,onUnmounted=Vue.onUnmounted,'
              + 'onBeforeMount=Vue.onBeforeMount,onBeforeUnmount=Vue.onBeforeUnmount,'
              + 'nextTick=Vue.nextTick,toRefs=Vue.toRefs,toRef=Vue.toRef,'
              + 'isRef=Vue.isRef,unref=Vue.unref,provide=Vue.provide,inject=Vue.inject,h=Vue.h;\n'
              + parsed.script + '\n'
              + 'return (typeof exports !== "undefined" ? exports.default : {});\n'
              + '}';
          }

          setupFn = setupFn.replace(/<\/script>/gi, '<\\/script>');

          return '<!DOCTYPE html>\n<html>\n<head>\n<meta charset="UTF-8">\n'
            + '<meta name="viewport" content="width=device-width, initial-scale=1.0">\n'
            + '<script type="importmap">\n'
            + '{\n'
            + '  "imports": {\n'
            + '    "vue": "https://unpkg.com/vue@3/dist/vue.esm-browser.js",\n'
            + '    "gsap": "https://unpkg.com/gsap@3.12.5/index.js",\n'
            + '    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"\n'
            + '  }\n'
            + '}\n'
            + '<\/script>\n'
            + '</head>\n<body>\n<div id="app"></div>\n'
            + '<script type="module">\n'
            + 'import * as Vue from "vue";\n'
            + (topImports ? topImports + '\n' : '')
            + styleLines + '\n'
            + 'var app = Vue.createApp({\n'
            + '  template: ' + templateJson + ',\n'
            + '  setup: ' + setupFn + '\n'
            + '});\n'
            + 'app.mount("#app");\n'
            + '<\/script>\n</body>\n</html>';
        }

        const parsedSFC = computed(function() {
          return parseVueSFC(liveComponentCode.value);
        });
        const liveSrc = computed(function() {
          return buildLivePreview(parsedSFC.value);
        });

        function setPreviewTab(tab) {
          previewTab.value = tab;
          liveError.value = '';
          if (tab === 'live' && liveComponentCode.value) {
            liveFrameKey.value++;
          }
        }

        watch(codeBlocks, function() {
          if (previewTab.value === 'live' && liveComponentCode.value) {
            liveFrameKey.value++;
            liveError.value = '';
          }
        }, { deep: true });

        async function refreshHealth() {
          try {
            var r = await fetch(API + '/health');
            health.value = await r.json();
          } catch (e) { health.value = { freellmapi_reachable: false }; }
        }
        async function refreshModels() {
          try {
            var r = await fetch(API + '/models');
            if (r.ok) { var d = await r.json(); models.value = d.models; }
          } catch (e) {}
        }

        var healthClass = computed(function() {
          return health.value && health.value.freellmapi_reachable ? 'ok' : 'bad';
        });
        var healthText = computed(function() {
          if (!health.value) return 'checking…';
          if (health.value.freellmapi_reachable) return 'proxy reachable';
          if (!health.value.key_configured) return 'FREELLMAPI_KEY not set';
          return 'proxy unreachable';
        });

        async function scrollBottom() {
          await nextTick();
          if (chatArea.value) chatArea.value.scrollTop = chatArea.value.scrollHeight;
        }

        var STEP_LABELS = {
          classify: 'Classifying', fetch: 'Fetching', build: 'Building',
          reading: 'Reading', processing: 'Processing', llm: 'Analyzing',
        };
        function initSteps() {
          steps.value = [];
          stepMsg.value = '';
        }
        function advanceStep(stepKey) {
          var idx = steps.value.findIndex(function(s) { return s.step === stepKey; });
          if (idx === -1) {
            steps.value.push({ step: stepKey, label: STEP_LABELS[stepKey] || stepKey, status: 'pending' });
            idx = steps.value.length - 1;
          }
          for (var i = 0; i < idx; i++) steps.value[i].status = 'done';
          steps.value[idx].status = 'active';
        }
        function markStepError() {
          for (var i = 0; i < steps.value.length; i++) {
            if (steps.value[i].status === 'active') { steps.value[i].status = 'error'; break; }
          }
        }

        async function parseNDJSONStream(response, onResult, onError) {
          var reader = response.body.getReader();
          var decoder = new TextDecoder();
          var buffer = '';
          while (true) {
            var chunk = await reader.read();
            if (chunk.done) break;
            buffer += decoder.decode(chunk.value, { stream: true });
            var lines = buffer.split('\n');
            buffer = lines.pop();
            for (var i = 0; i < lines.length; i++) {
              var line = lines[i];
              if (!line.trim()) continue;
              try {
                var evt = JSON.parse(line);
                if (evt.type === 'progress') {
                  stepMsg.value = evt.message;
                  advanceStep(evt.step);
                } else if (evt.type === 'result') {
                  for (var j = 0; j < steps.value.length; j++) {
                    if (steps.value[j].status !== 'error') steps.value[j].status = 'done';
                  }
                  onResult(evt);
                } else if (evt.type === 'error') {
                  markStepError();
                  stepMsg.value = evt.message;
                  onError(evt.message);
                }
              } catch (e) {}
            }
          }
        }

        async function send() {
          var text = draft.value.trim();
          if (!text || busy.value) return;
          busy.value = true; errorMsg.value = '';
          messages.value.push({ role: 'user', content: text });
          draft.value = '';
          await scrollBottom();
          createSession(text);

          var isFirst = messages.value.filter(function(m) { return m.role !== 'system'; }).length === 1;
          initSteps();

          try {
            var body = isFirst
              ? { input: text, model: model.value || null, stream: true }
              : { history: messages.value.slice(0, -1).map(function(m) { return { role: m.role, content: m.content }; }),
                  message: text, model: model.value || null, stream: true };
            var url = isFirst ? API + '/analyze_input' : API + '/chat';
            var r = await fetch(url, {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(body),
            });
            if (!r.ok) {
              var d = await r.json().catch(function() { return {}; });
              throw new Error(d.detail || 'HTTP ' + r.status);
            }

            await parseNDJSONStream(r,
              function(data) {
                messages.value.push({ role: 'assistant', content: data.reply });
                lastMeta.value = data;
                codeBlocks.value = extractCode(data.reply);
                lastReply.value = data.reply;
                crystalStatus.value = null;
                if (!skillName.value && data.reply) {
                  skillName.value = guessSkillName(data.reply);
                }
                updateActiveSessionSnapshot();
              },
              function(errMsg) {
                errorMsg.value = errMsg;
                messages.value.push({ role: 'assistant',
                  content: '\u26a0\ufe0f Request failed: ' + errMsg });
                updateActiveSessionSnapshot();
              }
            );
            await scrollBottom();
          } catch (e) {
            errorMsg.value = e.message;
            messages.value.push({ role: 'assistant',
              content: '\u26a0\ufe0f Request failed: ' + e.message + '\n(Proxy may be down or key missing.)' });
            updateActiveSessionSnapshot();
            await scrollBottom();
          } finally {
            busy.value = false;
            steps.value = [];
            await scrollBottom();
          }
        }

        async function copy(code) {
          try { await navigator.clipboard.writeText(code); } catch (e) {}
        }

        async function uploadFile(file) {
          if (!file) return;
          if (busy.value) return;
          busy.value = true; errorMsg.value = '';
          messages.value.push({ role: 'user',
            content: '\ud83d\udcce Uploaded file: ' + file.name + ' (' + file.size + ' bytes)' });
          await scrollBottom();
          createSession('Upload: ' + file.name);
          initSteps();
          try {
            var fd = new FormData();
            fd.append('file', file);
            if (model.value) fd.append('model', model.value);
            fd.append('stream', 'true');
            var r = await fetch(API + '/upload', { method: 'POST', body: fd });
            if (!r.ok) {
              var d = await r.json().catch(function() { return {}; });
              throw new Error(d.detail || 'HTTP ' + r.status);
            }
            await parseNDJSONStream(r,
              function(data) {
                messages.value.push({ role: 'assistant', content: data.reply });
                lastMeta.value = data;
                codeBlocks.value = extractCode(data.reply);
                lastReply.value = data.reply;
                crystalStatus.value = null;
                if (!skillName.value && data.reply) {
                  skillName.value = guessSkillName(data.reply);
                }
                updateActiveSessionSnapshot();
              },
              function(errMsg) {
                errorMsg.value = errMsg;
                messages.value.push({ role: 'assistant',
                  content: '\u26a0\ufe0f Upload failed: ' + errMsg });
                updateActiveSessionSnapshot();
              }
            );
            await scrollBottom();
          } catch (e) {
            errorMsg.value = e.message;
            messages.value.push({ role: 'assistant',
              content: '\u26a0\ufe0f Upload failed: ' + e.message });
            updateActiveSessionSnapshot();
            await scrollBottom();
          } finally {
            busy.value = false;
            steps.value = [];
            await scrollBottom();
          }
        }
        function onDrop(e) {
          dragging.value = false;
          var f = e.dataTransfer.files && e.dataTransfer.files[0];
          if (f) uploadFile(f);
        }
        function onFilePick(e) {
          var f = e.target.files && e.target.files[0];
          if (f) uploadFile(f);
          e.target.value = '';
        }

        function guessSkillName(text) {
          var m = text.match(/^\s*#+\s*(.+?)\s*$/m);
          if (m) return m[1].slice(0, 60);
          var lines = text.split('\n');
          for (var i = 0; i < lines.length; i++) {
            var t = lines[i].trim().replace(/^[-*]\s+/, '');
            if (t) return t.slice(0, 60);
          }
          return 'Untitled Skill';
        }

        async function crystallize() {
          if (!canCrystallize.value || crystallizing.value) return;
          crystallizing.value = true;
          crystalStatus.value = null;
          try {
            var body = {
              reply: lastReply.value,
              skill_name: skillName.value || guessSkillName(lastReply.value),
              session_id: activeSessionId.value || null,
            };
            var r = await fetch(API + '/crystallize', {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(body),
            });
            if (!r.ok) {
              var d = await r.json().catch(function() { return {}; });
              throw new Error(d.detail || 'HTTP ' + r.status);
            }
            var dd = await r.json();
            crystalStatus.value = {
              kind: 'ok',
              text: '\u2713 Crystallized \u2192 ' + dd.filename + '  (' + dd.code_block_count + ' block(s), '
                    + dd.rules_chars + ' rule chars)  ' + (dd.available_to_mcp ? '\u00b7 visible to MCP \u2713' : '\u00b7 NOT visible to MCP')
            };
            if (activeSessionId.value) {
              var s = historySessions.value.find(function(s) { return s.id === activeSessionId.value; });
              if (s) {
                s.crystallized = true;
                s.snapshot = snapshotState();
                saveSession(s);
              }
            }
          } catch (e) {
            crystalStatus.value = { kind: 'err', text: '\u2717 ' + e.message };
          } finally {
            crystallizing.value = false;
          }
        }

        window.addEventListener('dragover', function(e) { e.preventDefault(); });
        window.addEventListener('drop', function(e) { e.preventDefault(); });

        var libraryCategories = computed(function() {
          var cats = ['All'];
          var seen = {};
          libraryItems.value.forEach(function(item) {
            var c = item.category || 'Uncategorized';
            if (!seen[c]) { seen[c] = true; cats.push(c); }
          });
          return cats;
        });
        var libraryFiltered = computed(function() {
          var q = librarySearch.value.toLowerCase().trim();
          var cat = libraryCategory.value;
          return libraryItems.value.filter(function(item) {
            if (cat !== 'All' && (item.category || 'Uncategorized') !== cat) return false;
            if (!q) return true;
            return (item.name || '').toLowerCase().indexOf(q) !== -1
              || (item.tags || []).some(function(t) { return t.toLowerCase().indexOf(q) !== -1; })
              || (item.category || '').toLowerCase().indexOf(q) !== -1;
          });
        });

        function catCount(cat) {
          return libraryItems.value.filter(function(item) {
            return (item.category || 'Uncategorized') === cat;
          }).length;
        }

        function showToast(text, kind) {
          libraryToast.value = { text: text, kind: kind || 'ok' };
          setTimeout(function() { libraryToast.value = null; }, 3500);
        }

        async function loadLibrary() {
          try {
            var r = await fetch(API_LIB);
            if (r.ok) libraryItems.value = await r.json();
          } catch (e) { libraryItems.value = []; }
          previewCache.value = {};
          previewLoading.value = {};
          buildPreviews();
        }

        async function deleteItem(filename) {
          if (!confirm('Delete "' + filename + '"? This cannot be undone.')) return;
          try {
            var r = await fetch(API_LIB + '/' + encodeURIComponent(filename), { method: 'DELETE' });
            if (!r.ok) {
              var d = await r.json().catch(function() { return {}; });
              throw new Error(d.detail || 'HTTP ' + r.status);
            }
            libraryItems.value = libraryItems.value.filter(function(i) { return i.filename !== filename; });
            showToast('Deleted ' + filename, 'ok');
          } catch (e) {
            showToast('Delete failed: ' + e.message, 'err');
          }
        }

        async function forkItem(filename) {
          if (forkingFilename.value) return;
          forkingFilename.value = filename;
          try {
            var r = await fetch(API_LIB + '/' + encodeURIComponent(filename) + '/fork', { method: 'POST' });
            if (!r.ok) {
              var d = await r.json().catch(function() { return {}; });
              throw new Error(d.detail || 'HTTP ' + r.status);
            }
            var entry = await r.json();
            libraryItems.value.unshift(entry);
            showToast('Forked -> ' + entry.filename, 'ok');
          } catch (e) {
            showToast('Fork failed: ' + e.message, 'err');
          } finally {
            forkingFilename.value = null;
          }
        }

        async function regenerateItem(filename) {
          if (regeneratingFilename.value) return;
          regeneratingFilename.value = filename;
          try {
            var body = { model: model.value || null };
            var r = await fetch(API_LIB + '/' + encodeURIComponent(filename) + '/regenerate', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(body),
            });
            if (!r.ok) {
              var d = await r.json().catch(function() { return {}; });
              throw new Error(d.detail || 'HTTP ' + r.status);
            }
            var data = await r.json();
            if (data.entry) {
              var idx = libraryItems.value.findIndex(function(i) { return i.filename === filename; });
              if (idx !== -1) libraryItems.value[idx] = data.entry;
              else libraryItems.value.unshift(data.entry);
            }
            showToast('Regenerated ' + filename, 'ok');
          } catch (e) {
            showToast('Regenerate failed: ' + e.message, 'err');
          } finally {
            regeneratingFilename.value = null;
          }
        }

        async function buildPreviews() {
          var items = libraryItems.value;
          for (var i = 0; i < items.length; i++) {
            var item = items[i];
            var fn = item.filename;
            if (previewCache.value[fn] !== undefined) continue;
            previewLoading.value[fn] = true;
            try {
              var r = await fetch(API_LIB + '/' + encodeURIComponent(fn) + '/content');
              if (!r.ok) { previewCache.value[fn] = ''; continue; }
              var data = await r.json();
              var codeBlocks = data.code_blocks || [];
              if (!codeBlocks.length) { previewCache.value[fn] = ''; continue; }
              var componentCode = '';
              for (var j = 0; j < codeBlocks.length; j++) {
                if (/<template[\s>]/.test(codeBlocks[j].code)) {
                  componentCode = codeBlocks[j].code; break;
                }
              }
              if (!componentCode) componentCode = codeBlocks[0].code;
              var parsed = parseVueSFC(componentCode);
              previewCache.value[fn] = parsed && parsed.template ? buildLivePreview(parsed) : '';
            } catch (e) {
              previewCache.value[fn] = '';
            } finally {
              delete previewLoading.value[fn];
            }
          }
        }

        function openLibrary() {
          if (view.value === 'library') {
            view.value = 'chat';
          } else {
            view.value = 'library';
            loadLibrary();
          }
          sidebarOpen.value = false;
        }

        loadHistory();
        refreshHealth();
        refreshModels();

        return {
          messages, draft, busy, errorMsg, lastMeta, codeBlocks, models, model,
          healthClass, healthText, send, copy, renderInline, chatArea,
          skillName, crystallizing, crystalStatus, rulesText, canCrystallize,
          crystallize, dragging, onDrop, onFilePick,
          previewTab, setPreviewTab, liveComponentCode, liveSrc,
          liveFrameKey, liveError,
          steps, stepMsg,
          sidebarOpen, historySessions, activeSessionId,
          selectSession, newSession,
          view, openLibrary, libraryItems, librarySearch, libraryCategory,
          libraryCategories, libraryFiltered, catCount,
          regeneratingFilename, forkingFilename, libraryToast,
          deleteItem, forkItem, regenerateItem, loadLibrary,
          previewCache, previewLoading,
        };
      }
    }).mount('#app');
  </script>
</body>
</html>
